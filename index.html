<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>元素記号学習ゲーム</title>
  <link rel="icon" type="image/png" sizes="512x512" href="./icon.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icon.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="science-background" aria-hidden="true">
    <span class="atom atom-a"></span>
    <span class="atom atom-b"></span>
    <span class="molecule molecule-a"></span>
    <span class="molecule molecule-b"></span>
  </div>

  <main class="game">
    <section class="quiz-panel" aria-live="polite">
      <div class="top-row">
        <div class="title-area">
          <p class="label">ポップな理科実験室</p>
          <div class="title-line">
            <span class="lab-icon flask" aria-hidden="true"></span>
            <h1>元素マスター</h1>
            <span class="lab-icon atom-mark" aria-hidden="true"></span>
          </div>
          <p id="screenLead" class="screen-lead">小テスト前に、元素番号・元素名・元素記号を楽しく確認しよう。</p>
        </div>

        <div id="scoreBox" class="score-box hidden">
          <span id="questionCount">1 / 10</span>
          <strong id="scoreText">0点</strong>
        </div>
      </div>

      <section id="modeScreen" class="mode-screen">
        <div class="mode-grid">
          <button class="mode-button featured-mode" type="button" data-mode="practice">
            <span>練習モード</span>
            <small>条件を選んで自由に練習</small>
          </button>
          <button class="mode-button" type="button" data-mode="exam">
            <span>小テスト本番</span>
            <small>30問ランダムで本番練習</small>
          </button>
          <button class="mode-button" type="button" data-mode="review">
            <span>苦手復習</span>
            <small>間違えた元素だけ復習</small>
          </button>
          <button class="mode-button" type="button" data-mode="cards">
            <span>暗記カード</span>
            <small>タップで確認して暗記</small>
          </button>
        </div>

        <div class="sound-panel" aria-label="音の設定">
          <button id="bgmToggle" class="toggle-button" type="button">BGM OFF</button>
          <button id="sfxToggle" class="toggle-button" type="button">効果音 ON</button>
          <label class="volume-control" for="bgmVolume">
            <span id="bgmVolumeLabel">BGM音量：30%</span>
            <input id="bgmVolume" type="range" min="0" max="100" value="30">
          </label>
          <label class="volume-control" for="sfxVolume">
            <span id="sfxVolumeLabel">効果音音量：50%</span>
            <input id="sfxVolume" type="range" min="0" max="100" value="50">
          </label>
        </div>
      </section>

      <section id="typeScreen" class="setup-screen hidden">
        <p class="setup-title">練習条件を選んでください</p>
        <div id="typeChoices" class="type-grid"></div>
        <div class="actions">
          <button id="practiceStartButton" class="main-button start-button" type="button">スタート</button>
          <button id="typeBackButton" class="sub-button" type="button">トップへ戻る</button>
        </div>
      </section>

      <section id="reviewScreen" class="setup-screen hidden">
        <p class="setup-title">苦手リスト</p>
        <div id="weakListArea" class="weak-list-area"></div>
        <p id="weakListMessage" class="result-message"></p>
        <div class="actions">
          <button id="reviewAllButton" class="main-button" type="button">苦手をまとめて復習</button>
          <button id="reviewSelectedButton" class="review-button" type="button">選んだ元素を復習</button>
          <button id="reviewListBackButton" class="sub-button" type="button">トップへ戻る</button>
        </div>
      </section>

      <section id="cardSetupScreen" class="setup-screen hidden">
        <p class="setup-title">暗記カード設定</p>
        <div id="cardSetupChoices" class="type-grid"></div>
        <div class="actions">
          <button id="cardStartButton" class="main-button start-button" type="button">暗記カードを始める</button>
          <button id="cardSetupBackButton" class="sub-button" type="button">トップへ戻る</button>
        </div>
      </section>

      <div id="progress" class="progress hidden" aria-label="進み具合">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <section id="quizScreen" class="hidden">
        <div id="questionArea" class="question-area">
          <p id="questionType" class="question-type"></p>
          <h2 id="questionText"></h2>
        </div>

        <div id="choices" class="choices"></div>

        <p id="resultMessage" class="result-message"></p>

        <div class="actions">
          <button id="answerButton" class="main-button answer-button" type="button">答える</button>
          <button id="nextButton" class="main-button" type="button" disabled>次の問題へ</button>
          <button id="quizBackButton" class="sub-button" type="button">トップへ戻る</button>
        </div>
      </section>

      <section id="resultScreen" class="hidden">
        <div id="resultCard" class="question-area final-card">
          <p id="resultTitle" class="question-type">研究結果レポート</p>
          <h2 id="finalScoreText">0 / 10 点</h2>
          <p id="finalComment" class="final-comment"></p>
        </div>

        <div id="missedListArea" class="missed-list-area"></div>

        <div class="actions">
          <button id="reviewButton" class="review-button hidden" type="button">苦手復習をする</button>
          <button id="reviewListButton" class="main-button hidden" type="button">苦手リストに戻る</button>
          <button id="resultBackButton" class="sub-button" type="button">トップへ戻る</button>
        </div>
      </section>

      <section id="cardScreen" class="hidden">
        <div class="card-settings">
          <label for="cardFrontSelect">カードの表</label>
          <select id="cardFrontSelect">
            <option value="symbol">元素記号</option>
            <option value="name">元素名</option>
            <option value="number">元素番号</option>
          </select>
        </div>

        <button id="flashCard" class="flash-card" type="button">
          <span id="cardHint" class="card-hint">タップして答えを見る</span>
          <strong id="cardFrontText"></strong>
          <span id="cardAnswer" class="card-answer"></span>
        </button>

        <div class="actions">
          <button id="cardRevealButton" class="main-button" type="button">答えを見る</button>
          <button id="cardNextButton" class="main-button" type="button">次へ</button>
          <button id="cardBackButton" class="sub-button" type="button">トップへ戻る</button>
        </div>
      </section>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
